name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Check shell scripts
        run: |
          sh -n install.sh
          sh -n scripts/test-install.sh
          sh -n scripts/release.sh

      - name: Compile Python modules
        run: PYTHONPYCACHEPREFIX=/tmp/scummkit-pycache python -m py_compile scummkit/*.py scummkit/commands/*.py scummkit/builders/*.py

      - name: Run tests
        run: python -m pytest
